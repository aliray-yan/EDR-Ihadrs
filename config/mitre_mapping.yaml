# =============================================================================
# IHADRS — MITRE ATT&CK Mapping
# config/mitre_mapping.yaml
#
# Curated subset of MITRE ATT&CK Enterprise techniques relevant to IHADRS
# detection rules. Used by the intelligence module to enrich ThreatEvents
# with descriptive names, tactic context, and documentation links.
#
# Source: https://attack.mitre.org/techniques/enterprise/
# Version: ATT&CK v14.1 (2024)
# =============================================================================

tactics:
  TA0001:
    name: "Initial Access"
    description: "Techniques used to gain their initial foothold within a network"
    url: "https://attack.mitre.org/tactics/TA0001/"
  TA0002:
    name: "Execution"
    description: "Techniques that result in adversary-controlled code running on a local or remote system"
    url: "https://attack.mitre.org/tactics/TA0002/"
  TA0003:
    name: "Persistence"
    description: "Techniques that adversaries use to keep access to systems across restarts, credential changes"
    url: "https://attack.mitre.org/tactics/TA0003/"
  TA0004:
    name: "Privilege Escalation"
    description: "Techniques that adversaries use to gain higher-level permissions on a system or network"
    url: "https://attack.mitre.org/tactics/TA0004/"
  TA0005:
    name: "Defense Evasion"
    description: "Techniques that adversaries use to avoid detection throughout their compromise"
    url: "https://attack.mitre.org/tactics/TA0005/"
  TA0006:
    name: "Credential Access"
    description: "Techniques for stealing credentials like account names and passwords"
    url: "https://attack.mitre.org/tactics/TA0006/"
  TA0007:
    name: "Discovery"
    description: "Techniques an adversary may use to gain knowledge about the system and internal network"
    url: "https://attack.mitre.org/tactics/TA0007/"
  TA0008:
    name: "Lateral Movement"
    description: "Techniques that adversaries use to enter and control remote systems on a network"
    url: "https://attack.mitre.org/tactics/TA0008/"
  TA0009:
    name: "Collection"
    description: "Techniques adversaries may use to gather information and the sources information is collected from"
    url: "https://attack.mitre.org/tactics/TA0009/"
  TA0010:
    name: "Exfiltration"
    description: "Techniques that adversaries may use to steal data from your network"
    url: "https://attack.mitre.org/tactics/TA0010/"
  TA0011:
    name: "Command and Control"
    description: "Techniques that adversaries may use to communicate with systems under their control"
    url: "https://attack.mitre.org/tactics/TA0011/"
  TA0040:
    name: "Impact"
    description: "Techniques that adversaries use to disrupt availability or compromise integrity"
    url: "https://attack.mitre.org/tactics/TA0040/"
  TA0042:
    name: "Resource Development"
    description: "Techniques that involve adversaries creating, purchasing, or compromising resources"
    url: "https://attack.mitre.org/tactics/TA0042/"
  TA0043:
    name: "Reconnaissance"
    description: "Techniques that involve adversaries actively or passively gathering information"
    url: "https://attack.mitre.org/tactics/TA0043/"


techniques:

  # ---------------------------------------------------------------------------
  # EXECUTION
  # ---------------------------------------------------------------------------
  T1059:
    name: "Command and Scripting Interpreter"
    tactic_ids: ["TA0002"]
    description: >
      Adversaries may abuse command and script interpreters to execute commands,
      scripts, or binaries. These interfaces and languages provide ways of
      interacting with computer systems and are a common feature across many
      different platforms.
    url: "https://attack.mitre.org/techniques/T1059/"
    severity_hint: HIGH
    subtechniques:
      T1059.001:
        name: "PowerShell"
        description: >
          Adversaries may abuse PowerShell commands and scripts for execution.
          PowerShell is a powerful interactive command-line interface and
          scripting environment included in the Windows operating system.
        url: "https://attack.mitre.org/techniques/T1059/001/"
        severity_hint: HIGH
      T1059.003:
        name: "Windows Command Shell"
        description: >
          Adversaries may abuse the Windows command shell for execution.
          The Windows command shell (cmd.exe) is the primary command prompt
          on Windows systems.
        url: "https://attack.mitre.org/techniques/T1059/003/"
        severity_hint: MEDIUM
      T1059.005:
        name: "Visual Basic"
        description: >
          Adversaries may abuse Visual Basic (VB) for execution. VB is a
          programming language created by Microsoft with interoperability
          with many Windows technologies.
        url: "https://attack.mitre.org/techniques/T1059/005/"
        severity_hint: HIGH

  T1204:
    name: "User Execution"
    tactic_ids: ["TA0002"]
    description: >
      An adversary may rely upon specific actions by a user in order to gain
      execution. Users may be subjected to social engineering to get them to
      execute malicious code by, for example, opening a malicious document
      file or link.
    url: "https://attack.mitre.org/techniques/T1204/"
    severity_hint: MEDIUM
    subtechniques:
      T1204.002:
        name: "Malicious File"
        description: >
          An adversary may rely upon a user opening a malicious file in order
          to gain execution. Users may be subjected to social engineering to
          get them to open a file that will lead to code execution.
        url: "https://attack.mitre.org/techniques/T1204/002/"
        severity_hint: HIGH

  # ---------------------------------------------------------------------------
  # PERSISTENCE
  # ---------------------------------------------------------------------------
  T1547:
    name: "Boot or Logon Autostart Execution"
    tactic_ids: ["TA0003", "TA0004"]
    description: >
      Adversaries may configure system settings to automatically execute a
      program during system boot or logon to maintain persistence or gain
      higher-level privileges on compromised systems.
    url: "https://attack.mitre.org/techniques/T1547/"
    severity_hint: HIGH
    subtechniques:
      T1547.001:
        name: "Registry Run Keys / Startup Folder"
        description: >
          Adversaries may achieve persistence by adding a program to a startup
          folder or referencing it with a Registry run key. Adding an entry to
          the run keys in the Registry or startup folder will cause the program
          referenced to be executed when a user logs in.
        url: "https://attack.mitre.org/techniques/T1547/001/"
        severity_hint: HIGH

  T1053:
    name: "Scheduled Task/Job"
    tactic_ids: ["TA0003", "TA0004", "TA0002"]
    description: >
      Adversaries may abuse task scheduling functionality to facilitate initial
      or recurring execution of malicious code. Utilities exist within all major
      operating systems to schedule programs or scripts to be executed at a
      specified date and time.
    url: "https://attack.mitre.org/techniques/T1053/"
    severity_hint: HIGH
    subtechniques:
      T1053.005:
        name: "Scheduled Task"
        description: >
          Adversaries may abuse the Windows Task Scheduler to perform task
          scheduling for initial or recurring execution of malicious code.
        url: "https://attack.mitre.org/techniques/T1053/005/"
        severity_hint: HIGH

  T1543:
    name: "Create or Modify System Process"
    tactic_ids: ["TA0003", "TA0004"]
    description: >
      Adversaries may create or modify system-level processes to repeatedly
      execute malicious payloads as part of persistence.
    url: "https://attack.mitre.org/techniques/T1543/"
    severity_hint: HIGH
    subtechniques:
      T1543.003:
        name: "Windows Service"
        description: >
          Adversaries may create or modify Windows services to repeatedly
          execute malicious payloads as part of persistence.
        url: "https://attack.mitre.org/techniques/T1543/003/"
        severity_hint: HIGH

  T1546:
    name: "Event Triggered Execution"
    tactic_ids: ["TA0003", "TA0004"]
    description: >
      Adversaries may establish persistence and/or elevate privileges using
      system mechanisms that trigger execution based on specific events.
    url: "https://attack.mitre.org/techniques/T1546/"
    severity_hint: MEDIUM
    subtechniques:
      T1546.002:
        name: "Screensaver"
        description: >
          Adversaries may establish persistence by executing malicious content
          triggered by user inactivity.
        url: "https://attack.mitre.org/techniques/T1546/002/"
        severity_hint: MEDIUM
      T1546.003:
        name: "Windows Management Instrumentation Event Subscription"
        description: >
          Adversaries may establish persistence and elevate privileges by
          executing malicious content triggered by a Windows Management
          Instrumentation (WMI) event subscription.
        url: "https://attack.mitre.org/techniques/T1546/003/"
        severity_hint: HIGH

  # ---------------------------------------------------------------------------
  # DEFENSE EVASION
  # ---------------------------------------------------------------------------
  T1218:
    name: "System Binary Proxy Execution"
    tactic_ids: ["TA0005"]
    description: >
      Adversaries may bypass process and/or signature-based defenses by proxying
      execution of malicious content with signed, or otherwise trusted, binaries.
    url: "https://attack.mitre.org/techniques/T1218/"
    severity_hint: HIGH

  T1055:
    name: "Process Injection"
    tactic_ids: ["TA0004", "TA0005"]
    description: >
      Adversaries may inject code into processes in order to evade
      process-based defenses as well as possibly elevate privileges.
    url: "https://attack.mitre.org/techniques/T1055/"
    severity_hint: HIGH
    subtechniques:
      T1055.001:
        name: "Dynamic-link Library Injection"
        description: >
          Adversaries may inject dynamic-link libraries (DLLs) into processes
          in order to evade process-based defenses as well as possibly elevate
          privileges.
        url: "https://attack.mitre.org/techniques/T1055/001/"
        severity_hint: HIGH
      T1055.012:
        name: "Process Hollowing"
        description: >
          Adversaries may inject malicious code into suspended and hollowed
          processes in order to evade process-based defenses.
        url: "https://attack.mitre.org/techniques/T1055/012/"
        severity_hint: HIGH

  T1562:
    name: "Impair Defenses"
    tactic_ids: ["TA0005"]
    description: >
      Adversaries may maliciously modify components of a victim environment
      in order to hinder or disable defensive mechanisms.
    url: "https://attack.mitre.org/techniques/T1562/"
    severity_hint: HIGH
    subtechniques:
      T1562.001:
        name: "Disable or Modify Tools"
        description: >
          Adversaries may modify and/or disable security tools to avoid
          possible detection of their malware/tools and activities.
        url: "https://attack.mitre.org/techniques/T1562/001/"
        severity_hint: HIGH

  T1565:
    name: "Data Manipulation"
    tactic_ids: ["TA0040"]
    description: >
      Adversaries may insert, delete, or manipulate data in order to influence
      external outcomes or hide activity.
    url: "https://attack.mitre.org/techniques/T1565/"
    severity_hint: MEDIUM
    subtechniques:
      T1565.001:
        name: "Stored Data Manipulation"
        description: >
          Adversaries may insert, delete, or manipulate data at rest in order
          to influence external outcomes or hide activity.
        url: "https://attack.mitre.org/techniques/T1565/001/"
        severity_hint: MEDIUM

  # ---------------------------------------------------------------------------
  # CREDENTIAL ACCESS
  # ---------------------------------------------------------------------------
  T1003:
    name: "OS Credential Dumping"
    tactic_ids: ["TA0006"]
    description: >
      Adversaries may attempt to dump credentials to obtain account login
      and credential material, normally in the form of a hash or a clear
      text password, from the operating system and software.
    url: "https://attack.mitre.org/techniques/T1003/"
    severity_hint: CRITICAL
    subtechniques:
      T1003.001:
        name: "LSASS Memory"
        description: >
          Adversaries may attempt to access credential material stored in
          the process memory of the Local Security Authority Subsystem Service
          (LSASS).
        url: "https://attack.mitre.org/techniques/T1003/001/"
        severity_hint: CRITICAL

  T1555:
    name: "Credentials from Password Stores"
    tactic_ids: ["TA0006"]
    description: >
      Adversaries may search for common password storage locations to obtain
      user credentials.
    url: "https://attack.mitre.org/techniques/T1555/"
    severity_hint: HIGH
    subtechniques:
      T1555.003:
        name: "Credentials from Web Browsers"
        description: >
          Adversaries may acquire credentials from web browsers by reading
          files specific to the target browser.
        url: "https://attack.mitre.org/techniques/T1555/003/"
        severity_hint: HIGH

  T1110:
    name: "Brute Force"
    tactic_ids: ["TA0006"]
    description: >
      Adversaries may use brute force techniques to gain access to accounts
      when passwords are unknown or when password hashes are obtained.
    url: "https://attack.mitre.org/techniques/T1110/"
    severity_hint: HIGH

  # ---------------------------------------------------------------------------
  # LATERAL MOVEMENT
  # ---------------------------------------------------------------------------
  T1021:
    name: "Remote Services"
    tactic_ids: ["TA0008"]
    description: >
      Adversaries may use Valid Accounts to log into a service specifically
      designed to accept remote connections, such as telnet, SSH, and VNC.
    url: "https://attack.mitre.org/techniques/T1021/"
    severity_hint: HIGH
    subtechniques:
      T1021.002:
        name: "SMB/Windows Admin Shares"
        description: >
          Adversaries may use Valid Accounts to interact with a remote network
          share using Server Message Block (SMB).
        url: "https://attack.mitre.org/techniques/T1021/002/"
        severity_hint: CRITICAL

  # ---------------------------------------------------------------------------
  # COLLECTION
  # ---------------------------------------------------------------------------
  T1005:
    name: "Data from Local System"
    tactic_ids: ["TA0009"]
    description: >
      Adversaries may search local system sources, such as file systems and
      configuration files or local databases, to find files of interest and
      sensitive data prior to exfiltration.
    url: "https://attack.mitre.org/techniques/T1005/"
    severity_hint: LOW

  T1115:
    name: "Clipboard Data"
    tactic_ids: ["TA0009"]
    description: >
      Adversaries may collect data stored in the clipboard from users copying
      information within or between applications.
    url: "https://attack.mitre.org/techniques/T1115/"
    severity_hint: LOW

  # ---------------------------------------------------------------------------
  # COMMAND AND CONTROL
  # ---------------------------------------------------------------------------
  T1071:
    name: "Application Layer Protocol"
    tactic_ids: ["TA0011"]
    description: >
      Adversaries may communicate using OSI application layer protocols to
      avoid detection/network filtering by blending in with existing traffic.
    url: "https://attack.mitre.org/techniques/T1071/"
    severity_hint: HIGH
    subtechniques:
      T1071.001:
        name: "Web Protocols"
        description: >
          Adversaries may communicate using application layer protocols
          associated with web traffic to avoid detection/network filtering
          by blending in with existing traffic.
        url: "https://attack.mitre.org/techniques/T1071/001/"
        severity_hint: HIGH

  T1571:
    name: "Non-Standard Port"
    tactic_ids: ["TA0011"]
    description: >
      Adversaries may communicate over a commonly used port to bypass
      firewalls or network detection systems and to blend with normal network
      activity to avoid more detailed inspection.
    url: "https://attack.mitre.org/techniques/T1571/"
    severity_hint: MEDIUM

  T1573:
    name: "Encrypted Channel"
    tactic_ids: ["TA0011"]
    description: >
      Adversaries may employ a known encryption algorithm to conceal command
      and control traffic rather than relying on any inherent protections
      provided by a communication protocol.
    url: "https://attack.mitre.org/techniques/T1573/"
    severity_hint: HIGH

  # ---------------------------------------------------------------------------
  # INITIAL ACCESS
  # ---------------------------------------------------------------------------
  T1566:
    name: "Phishing"
    tactic_ids: ["TA0001"]
    description: >
      Adversaries may send phishing messages to gain access to victim systems.
      All forms of phishing are electronically delivered social engineering.
    url: "https://attack.mitre.org/techniques/T1566/"
    severity_hint: HIGH
    subtechniques:
      T1566.001:
        name: "Spearphishing Attachment"
        description: >
          Adversaries may send spearphishing emails with a malicious attachment
          in an attempt to gain access to victim systems.
        url: "https://attack.mitre.org/techniques/T1566/001/"
        severity_hint: CRITICAL

  T1091:
    name: "Replication Through Removable Media"
    tactic_ids: ["TA0001", "TA0008"]
    description: >
      Adversaries may move onto systems, possibly those on disconnected or
      air-gapped networks, by copying malware to removable media and taking
      advantage of Autorun features when the media is inserted into a system.
    url: "https://attack.mitre.org/techniques/T1091/"
    severity_hint: LOW

  T1105:
    name: "Ingress Tool Transfer"
    tactic_ids: ["TA0011"]
    description: >
      Adversaries may transfer tools or other files from an external system
      into a compromised environment.
    url: "https://attack.mitre.org/techniques/T1105/"
    severity_hint: MEDIUM

  # ---------------------------------------------------------------------------
  # DISCOVERY
  # ---------------------------------------------------------------------------
  T1135:
    name: "Network Share Discovery"
    tactic_ids: ["TA0007"]
    description: >
      Adversaries may look for folders and drives shared on remote systems
      as a means of identifying sources of information to gather as a
      precursor for collection and to identify potential systems of interest
      for Lateral Movement.
    url: "https://attack.mitre.org/techniques/T1135/"
    severity_hint: LOW

  # ---------------------------------------------------------------------------
  # IMPACT
  # ---------------------------------------------------------------------------
  T1486:
    name: "Data Encrypted for Impact"
    tactic_ids: ["TA0040"]
    description: >
      Adversaries may encrypt data on target systems or on large numbers of
      systems in a network to interrupt availability to system and network
      resources. They can attempt to render stored data inaccessible by
      encrypting files or data on local and remote drives and withholding
      access to a decryption key.
    url: "https://attack.mitre.org/techniques/T1486/"
    severity_hint: CRITICAL

  T1490:
    name: "Inhibit System Recovery"
    tactic_ids: ["TA0040"]
    description: >
      Adversaries may delete or remove built-in operating system data and
      turn off services designed to aid in the recovery of a corrupted system
      to prevent recovery.
    url: "https://attack.mitre.org/techniques/T1490/"
    severity_hint: CRITICAL

  T1496:
    name: "Resource Hijacking"
    tactic_ids: ["TA0040"]
    description: >
      Adversaries may leverage the resources of co-opted systems to complete
      resource-intensive tasks, which may impact system and/or hosted service
      availability.
    url: "https://attack.mitre.org/techniques/T1496/"
    severity_hint: MEDIUM